name: CI

on:
  push:
    branches: ["master", "main", "claude/**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install Catch2 (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y catch2

      - name: Install Catch2 (macOS)
        if: runner.os == 'macOS'
        run: brew install catch2

      # Windows: Catch2 is fetched automatically via FetchContent fallback

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run unit tests
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure -R pugg_unit_tests

      - name: Run integration tests
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure -R pugg_integration_tests
